---
# handlers file for AElQazouiInsights.dnsmasq
- name: Restart dnsmasq
  ansible.builtin.systemd:
    name: "{{ dnsmasq_service_name }}"
    state: restarted
    daemon_reload: yes

- name: Reload dnsmasq
  ansible.builtin.systemd:
    name: "{{ dnsmasq_service_name }}"
    state: reloaded

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
    daemon_reload: yes
