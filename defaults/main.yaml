# defaults file for AElQazouiInsights.dnsmasq

# Package and service configuration
dnsmasq_service_name: dnsmasq
dnsmasq_package_list:
  - dnsmasq

# Interface and network configuration
dnsmasq_interface: 'eth0'
dnsmasq_listen_address: '10.0.0.1'
dnsmasq_domain_name: picluster.quantfinancehub.com

# DHCP configuration
dnsmasq_dhcp_range: '10.0.0.32,10.0.0.128,12h'

# DNS upstream servers
dnsmasq_upstream_dns_servers:
  - 80.58.61.250
  - 80.58.61.254

# Additional services configuration
dnsmasq_additional_services:
  ntp:
    ip: 10.0.0.1
  dns:
    ip: 10.0.0.1
  s3:
    ip: 10.0.0.100
  vault:
    ip: 10.0.0.1
  argocd:
    ip: 10.0.0.100
  longhorn:
    ip: 10.0.0.100
  sso:
    ip: 10.0.0.100
  monitoring:
    ip: 10.0.0.100
  oauth2-proxy:
    ip: 10.0.0.100
  elasticsearch:
    ip: 10.0.0.100
  kibana:
    ip: 10.0.0.100
  fluentd:
    ip: 10.0.0.101

# Feature flags
dnsmasq_discover_inventory: true
dnsmasq_enable_logging: true
dnsmasq_log_queries: true
dnsmasq_log_dhcp: true

# Resolved configuration
dnsmasq_resolved_conf: true
dnsmasq_resolved_dns: "10.0.0.1"
dnsmasq_resolved_domains: "picluster.quantfinancehub.com"
dnsmasq_stop_resolved: true